<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
<title>Display Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%; width:100%;
  overflow:hidden; overscroll-behavior:none;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f1f5f9;color:#0f172a;
  height:100dvh; width:100vw;
  max-width:480px; margin:0 auto;
  display:flex; flex-direction:column;
}

/* ================= TOPBAR (sabit) ================= */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0;
  padding:10px 12px;
}
.topbar-left{display:flex; align-items:center; gap:7px;}
.topbar-title{
  font-size:11px; font-weight:700; letter-spacing:.05em; color:#e2e8f0;
  background:#1e293b; border:.5px solid #334155;
  height:36px; padding:0 12px; border-radius:9px;
  display:flex; align-items:center;
  box-sizing:border-box;
}
.home-btn{
  background:#1e293b;color:#e2e8f0;border:none;
  width:36px; height:36px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0;
}
.home-btn:active{ transform:scale(.93); }
.conn-status-box{
  width:36px; height:36px; border-radius:9px;
  background:#1e293b; border:.5px solid #334155;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
}
.conn-status-led{
  width:14px; height:14px; border-radius:50%;
  background:#ef4444;
  animation:ledBlink 1s infinite;
}
.conn-status-led.on{
  background:#16a34a;
  animation:none;
}

@keyframes ledBlink{
  0%, 100% { opacity:1; }
  50% { opacity:0; }
}

.conn-fallback-btn{
  background:#3b82f6;color:#fff;border:none;
  padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;
  display:none; margin-right:6px;
}
.conn-fallback-btn.show{display:inline-block}

/* ================= YATAY KAYDIRMA (pager) ================= */
.pager{
  flex:1;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
}
.pager::-webkit-scrollbar{ display:none; }
.page{
  flex:0 0 100%;
  width:100%;
  scroll-snap-align:start;
  overflow-y:auto;
  padding:8px 10px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

/* ================= DOTS (sabit, alt) ================= */
.dots{
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  gap:8px;
  padding:10px 0 14px;
}
.dot{
  width:7px; height:7px; border-radius:50%;
  background:#cbd5e1; border:none; cursor:pointer; padding:0;
  transition:all .2s;
}
.dot.active{ background:#3b82f6; width:20px; border-radius:4px; }
.frame-preview-bar{
  flex-shrink:0;
  padding:0 10px 10px;
}

/* ================= Kartlar ================= */
.card{
  background:#1e293b;border:.5px solid #334155;border-radius:12px;
  padding:12px;
}
.card-title{font-size:10px;font-weight:500;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

.toggle-row{display:flex;gap:8px}
.toggle-group{flex:1;display:flex;border:.5px solid #334155;border-radius:9px;overflow:hidden}
.toggle-group button{flex:1;border:none;background:transparent;padding:9px 6px;font-size:13px;color:#64748b;cursor:pointer;transition:all .15s}
.toggle-group button.active{background:#3b82f6;color:#fff}

.digit-row{display:flex;align-items:center;justify-content:center;gap:14px; padding:6px 0;}
.control-card{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
}
.control-drums{
  display:flex;
  gap:20px;
  align-items:center;
  justify-content:center;
}
.control-dirs{
  display:flex;
  gap:18px;
}
.status-card{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.status-card .status-grid{
  flex:1;
  align-content:start;
}
.status-card .toggle-group{
  flex:0 0 44px;
  height:44px;
}
.status-divider{
  flex-shrink:0;
  height:1px;
  background:#334155;
  margin:2px 0;
}

.adv-card{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;
}
.ctrl-byte-row{
  display:flex;
  gap:10px;
}
.ctrl-byte-col{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.ctrl-byte-label{
  font-size:10px;
  color:#64748b;
  font-weight:500;
  letter-spacing:.06em;
}
.ctrl-byte-input{
  width:100%;
  height:44px;
  text-align:center;
  background:#0f172a;
  border:.5px solid #334155;
  border-radius:9px;
  color:#e2e8f0;
  font-family:'JetBrains Mono',monospace;
  font-size:16px;
  font-weight:700;
  text-transform:uppercase;
}
.ctrl-byte-input:focus{
  outline:none;
  border-color:#3b82f6;
}

.status-card .toggle-group button{
  padding:0;
}
.drum-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.drum-col-label{font-size:11px;color:#64748b}
.drum{width:140px;height:260px;overflow:hidden;border-radius:16px;border:.5px solid #334155;background:#0f172a;position:relative;cursor:grab;user-select:none}

.drum:active{cursor:grabbing}
.drum-inner{position:absolute;width:100%}
.drum-item{height:60px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#334155;font-family:'JetBrains Mono',monospace;transition:color .1s, font-size .1s}
.drum-item.active{color:#f1f5f9;font-size:60px}
.drum-fade-top{position:absolute;top:0;left:0;right:0;height:100px;background:linear-gradient(to bottom,#0f172a,transparent);pointer-events:none;z-index:2}
.drum-fade-bot{position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(to top,#0f172a,transparent);pointer-events:none;z-index:2}
.drum-line.top{top:100px}
.drum-line.bot{bottom:100px}

.dir-col{display:flex;flex-direction:column;gap:8px;align-items:center;margin-left:2px}
.dir-col-label{font-size:11px;color:#64748b}
.dir-btn{width:76px;height:76px;border:.5px solid #334155;border-radius:16px;background:#0f172a;color:#475569;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.dir-btn:active{transform:scale(.93)}
.dir-btn.on{background:#16a34a;border-color:#16a34a;color:#fff}

.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.status-btn{
  padding:12px 8px;border:.5px solid #334155;border-radius:11px;
  background:#0f172a;color:#94a3b8;font-size:12px;font-weight:600;
  cursor:pointer;text-align:center;transition:all .15s;letter-spacing:.03em;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.status-btn svg{ width:22px; height:22px; flex-shrink:0; }
.status-btn:active{transform:scale(.96)}
.status-btn.on{background:#16a34a;border-color:#16a34a;color:#fff}
.status-btn.disabled{
  opacity:.35;
  cursor:not-allowed;
}
.status-btn.disabled:active{ transform:none; }

.frame-row{display:flex;flex-wrap:wrap;gap:5px;font-family:'Courier New',monospace;font-size:11px}
.byte-box{padding:3px 7px;border-radius:6px;border:.5px solid #334155;color:#64748b}
.byte-box.status{background:#422006;color:#fb923c;border-color:#92400e}
.byte-box.digit{background:#1e3a5f;color:#60a5fa;border-color:#1d4ed8}
.toast{font-size:11px;text-align:center;margin-top:6px;min-height:16px;transition:opacity .4s}

.adv-byte-row{margin-bottom:10px}
.adv-byte-label{font-size:10px;color:#64748b;margin-bottom:6px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.adv-bits{display:flex;gap:4px}
.bit-btn{flex:1;height:40px;border:.5px solid #334155;border-radius:8px;background:#0f172a;color:#64748b;font-size:13px;font-family:'Courier New',monospace;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s;padding:0;line-height:1}
.bit-btn.on{background:#16a34a;border-color:#16a34a;color:#fff}
.bit-btn:active{transform:scale(.93)}
.bit-idx{font-size:8px;opacity:.5}

.page-heading{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:2px 2px 0;}
</style>
</head>
<body>

<!-- ================= TOPBAR ================= -->
<div class="topbar">
  <div class="topbar-left">
  <div class="topbar-title">DISPLAY MANAGER</div>
</div>
<div style="display:flex; align-items:center; gap:8px;">
  <button class="conn-fallback-btn" id="connFallbackBtn">Bağlan</button>
  <div class="conn-status-box" id="connStatusBox" title="Bağlantı durumu">
    <span class="conn-status-led" id="connStatusLed"></span>
  </div>
  <button class="home-btn" id="homeBtn" aria-label="Ana Sayfa" title="Ana Sayfa">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </button>
</div>
</div>

<!-- ================= YATAY KAYDIRMALI SAYFALAR ================= -->
<div class="pager" id="pager">

  <!-- SAYFA 1: KONTROL -->
  <div class="page" id="page-0">
  <div class="card control-card">
    <div class="control-drums">
      <div class="drum-col">
        <div class="drum-col-label">Sol digit</div>
        <div class="drum" id="drum0">
          <div class="drum-fade-top"></div>
          <div class="drum-line top"></div>
          <div class="drum-inner" id="inner0"></div>
          <div class="drum-line bot"></div>
          <div class="drum-fade-bot"></div>
        </div>
      </div>
      <div class="drum-col">
        <div class="drum-col-label">Sag digit</div>
        <div class="drum" id="drum1">
          <div class="drum-fade-top"></div>
          <div class="drum-line top"></div>
          <div class="drum-inner" id="inner1"></div>
          <div class="drum-line bot"></div>
          <div class="drum-fade-bot"></div>
        </div>
      </div>
    </div>
    <div class="control-dirs">
      <button class="dir-btn" id="btn-up" onclick="toggleDir('up')">&#8593;</button>
<button class="dir-btn" id="btn-down" onclick="toggleDir('down')">&#8595;</button>
    </div>
  </div>
</div>
    
  

  <!-- SAYFA 2: DURUM BİTLERİ -->
  <!-- SAYFA 2: DURUM BİTLERİ -->
<div class="page" id="page-1">
  <div class="card status-card">
  <div class="toggle-group" id="tg-fmt">
    <button class="active" onclick="setOpt('fmt','A',this)">Format A</button>
    <button onclick="setOpt('fmt','B',this)">Format B</button>
  </div>
  <div class="status-divider"></div>
  <div class="status-grid" id="status-grid"></div>
</div>
</div>

  <!-- SAYFA 3: GELİŞMİŞ AYARLAR -->
  <!-- SAYFA 3: GELİŞMİŞ AYARLAR -->
<div class="page" id="page-2">
  <div class="card adv-card">
    <div class="adv-byte-row">
      <div class="adv-byte-label">STATUS_0</div>
      <div class="adv-bits" id="adv-s0"></div>
    </div>
    <div class="status-divider"></div>
    <div class="adv-byte-row" style="margin-bottom:0">
      <div class="adv-byte-label">STATUS_1</div>
      <div class="adv-bits" id="adv-s1"></div>
    </div>
  </div>
</div>

  <!-- SAYFA 4: AYARLAR -->
  <!-- SAYFA 4: AYARLAR -->
<!-- SAYFA 4: AYARLAR -->
<div class="page" id="page-3">
  <div class="page-heading">Ayarlar</div>
  <div class="card">
    <div class="card-title">Frame boyutu</div>
    <div class="toggle-group" id="tg-size">
      <button class="active" onclick="setOpt('size',6,this)">6 byte</button>
      <button onclick="setOpt('size',9,this)">9 byte</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">CTRL Byte'ları (9 byte modunda kullanılır)</div>
    <div class="ctrl-byte-row">
      <div class="ctrl-byte-col">
        <div class="ctrl-byte-label">CTRL_0</div>
        <input type="text" class="ctrl-byte-input" id="ctrl-byte-0" maxlength="2" value="FF">
      </div>
      <div class="ctrl-byte-col">
        <div class="ctrl-byte-label">CTRL_1</div>
        <input type="text" class="ctrl-byte-input" id="ctrl-byte-1" maxlength="2" value="FF">
      </div>
      <div class="ctrl-byte-col">
        <div class="ctrl-byte-label">CTRL_2</div>
        <input type="text" class="ctrl-byte-input" id="ctrl-byte-2" maxlength="2" value="FF">
      </div>
    </div>
  </div>
</div>

</div>

<!-- ================= DOTS ================= -->
<div class="dots" id="dots">
  <button class="dot active" data-page="0"></button>
  <button class="dot" data-page="1"></button>
  <button class="dot" data-page="2"></button>
  <button class="dot" data-page="3"></button>
</div>

<div class="frame-preview-bar">
  <div class="card" style="margin:0;">
    <div class="card-title">Frame onizleme</div>
    <div class="frame-row" id="frame-preview"></div>
    <div class="toast" id="toast" style="opacity:0"></div>
  </div>
</div>

<script>
// =====================================================================
// PAGER — yatay kaydırma + nokta senkronizasyonu
// =====================================================================
const pager = document.getElementById('pager');
const dots = Array.from(document.querySelectorAll('.dot'));

function goToPage(index) {
  const page = document.getElementById('page-' + index);
  pager.scrollTo({ left: page.offsetLeft, behavior: 'smooth' });
}

dots.forEach(dot => {
  dot.addEventListener('click', () => goToPage(Number(dot.dataset.page)));
});

let scrollTimeout;
pager.addEventListener('scroll', () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const index = Math.round(pager.scrollLeft / pager.clientWidth);
    dots.forEach((d, i) => d.classList.toggle('active', i === index));
  }, 60);
});

// =====================================================================
// ANA SAYFAYA DÖN — BLE bağlantısını kesip yönlendir
// =====================================================================
document.getElementById('homeBtn').addEventListener('click', () => {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
  }
  window.location.href = '../';
});

// =====================================================================
// BLE — OTOMATİK YENİDEN BAĞLANMA
// =====================================================================
const SERVICE_UUID        = '12345678-1234-1234-1234-123456789abc';
const CHARACTERISTIC_UUID = 'abcd1234-ab12-cd34-ef56-abcdef123456';

let bleDevice         = null;
let bleCharacteristic = null;
let connected         = false;
let sendTimer         = null;

const connStatusLed = document.getElementById('connStatusLed');
const connFallbackBtn = document.getElementById('connFallbackBtn');

async function connectToDevice(device) {
  try {
    device.addEventListener('gattserverdisconnected', onDisconnected);
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    bleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);
    bleDevice = device;
    connected = true;
    updateConnUI();
  } catch (err) {
    showToast('Bağlantı hatası: ' + err.message, '#f87171');
    connected = false;
    updateConnUI();
  }
}

async function tryAutoReconnect() {
  const savedId = localStorage.getItem('redlift_last_device_id');
  if (!savedId || !navigator.bluetooth.getDevices) {
    updateConnUI();
    return;
  }
  try {
    const knownDevices = await navigator.bluetooth.getDevices();
    const match = knownDevices.find(d => d.id === savedId);
    if (match) {
      await connectToDevice(match);
    } else {
      updateConnUI();
    }
  } catch (err) {
    console.error('Otomatik bağlantı hatası:', err);
    updateConnUI();
  }
}

connFallbackBtn.addEventListener('click', async () => {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'BILAB-DSPM' }],
      optionalServices: [SERVICE_UUID]
    });
    localStorage.setItem('redlift_last_device_id', device.id);
    await connectToDevice(device);
  } catch (err) {
    showToast('HATA: ' + err.message, '#f87171');
  }
});

function onDisconnected() {
  connected = false;
  bleCharacteristic = null;
  updateConnUI();
  showToast('BAĞLANTI KESİLDİ', '#f87171');
}

function updateConnUI() {
  connStatusLed.classList.toggle('on', connected);
  connFallbackBtn.classList.toggle('show', !connected);
}

// =====================================================================
// AUTO SEND (debounce 150ms)
// =====================================================================
function scheduleAutoSend() {
  if (!connected || !bleCharacteristic) return;
  clearTimeout(sendTimer);
  sendTimer = setTimeout(doSend, 150);
}

async function doSend() {
  if (!connected || !bleCharacteristic) return;
  try {
    await bleCharacteristic.writeValue(new Uint8Array(buildFrame()));
  } catch (err) {
    showToast('HATA: ' + err.message, '#f87171');
  }
}

// =====================================================================
// STATE
// =====================================================================
let cfg    = { size: 6, fmt: 'A' };
let ctrlBytes = [0xFF, 0xFF, 0xFF]; // CTRL_0, CTRL_1, CTRL_2 (sadece 9 byte modunda)
let digits = [0, 0];
let s0 = 0, s1 = 0;

const FORMAT_DEFS = {
  A: {
    s0_const: 0x00,
    status: [
      { key:'oss',        label:'OSS',        s0bits:[0], s1bits:[7] },
      { key:'overload',   label:'OVERLOAD',   s0bits:[],  s1bits:[6] },
      { key:'fire',       label:'FIRE',       s0bits:[],  s1bits:[0] },
      { key:'emergency',  label:'EMERGENCY',  s0bits:[],  s1bits:[1] },
      { key:'earthquake', label:'EARTHQUAKE', s0bits:[3], s1bits:[]  },
      { key:'prc',        label:'PRC',        s0bits:[2], s1bits:[]  },
    ],
    dir: { up: { s1: 4 }, down: { s1: 5 } }
  },
  B: {
    s0_const: 0x80,
    status: [
      { key:'oss',       label:'OSS',       s0bits:[0], s1bits:[] },
      { key:'fire',      label:'FIRE',      s0bits:[6], s1bits:[] },
      { key:'emergency', label:'EMERGENCY', s0bits:[5], s1bits:[] },
      { key:'prc',       label:'PRC',       s0bits:[2], s1bits:[] },
      { key:'ats',       label:'ATS',       s0bits:[1], s1bits:[] },
    ],
    dir: { up: { s1: 0 }, down: { s1: 1 } }
  }
};

// Her durum için basit SVG ikon (stroke=currentColor, buton rengini otomatik alır)
const STATUS_ICONS = {
  oss: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>`,
  overload: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 L22 20 H2 Z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r=".6" fill="currentColor" stroke="none"/></svg>`,
  fire: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c1 3-2 4-2 7a4 4 0 0 0 8 0c0-1-.5-2-1-3 1 4-1 5-2 5 1-2-1-3-1-5-1 2-3 3-3 6a5 5 0 0 0 10 0c0-5-4-7-4-10z"/></svg>`,
  emergency: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><circle cx="12" cy="17" r=".6" fill="currentColor" stroke="none"/></svg>`,
  earthquake: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l2-7 4 14 3-9 2 5h5"/></svg>`,
  prc: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6z"/></svg>`,
  ats: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
  dong: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>`,
  dingdong: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/><path d="M12 2v1"/></svg>`,
};

const ALL_STATUS_ITEMS = [
  { key:'oss',        label:'OSS' },
  { key:'overload',   label:'OVERLOAD' },
  { key:'fire',       label:'FIRE' },
  { key:'emergency',  label:'EMERGENCY' },
  { key:'earthquake', label:'EARTHQUAKE' },
  { key:'prc',        label:'PRC' },
  { key:'ats',        label:'ATS' },
  { key:'dong',       label:'DONG' },
  { key:'dingdong',   label:'DINGDONG' },
];

const CHARS = [
  {c:'0',b:0x3F},{c:'1',b:0x06},{c:'2',b:0x5B},{c:'3',b:0x4F},
  {c:'4',b:0x66},{c:'5',b:0x6D},{c:'6',b:0x7D},{c:'7',b:0x07},
  {c:'8',b:0x7F},{c:'9',b:0x6F},{c:'A',b:0x77},{c:'B',b:0x91},
  {c:'C',b:0x39},{c:'D',b:0x92},{c:'E',b:0x79},{c:'F',b:0x71},
  {c:'G',b:0x93},{c:'H',b:0x76},{c:'I',b:0x94},{c:'J',b:0x1E},
  {c:'K',b:0x95},{c:'L',b:0x38},{c:'M',b:0x96},{c:'N',b:0x97},
  {c:'O',b:0x98},{c:'P',b:0x73},{c:'Q',b:0x99},{c:'R',b:0x9A},
  {c:'S',b:0x9B},{c:'T',b:0x9C},{c:'U',b:0x3E},{c:'V',b:0x9D},
  {c:'W',b:0x9E},{c:'X',b:0x9F},{c:'Y',b:0xA0},{c:'Z',b:0xA1},
  {c:'-',b:0x40},{c:' ',b:0x00}
];

function buildFrame() {
  const d1 = CHARS[digits[0]].b;
  const d2 = CHARS[digits[1]].b;
  if (cfg.size === 6) return [0x06, 0x06, s0, d1, d2, s1];
  return [ctrlBytes[0], ctrlBytes[1], ctrlBytes[2], 0x06, 0x06, s0, d1, d2, s1];
}

function h(n) { return '0x' + n.toString(16).toUpperCase().padStart(2,'0'); }

function update() {
  const frame   = buildFrame();
  const labels6 = ['CTRL_0','CTRL_1','STATUS_0','DIGIT_1','DIGIT_2','STATUS_1'];
  const labels9 = ['CTRL_0','CTRL_1','CTRL_2','CTRL_3','CTRL_4','STATUS_0','DIGIT_1','DIGIT_2','STATUS_1'];
  const types6  = ['','','status','digit','digit','status'];
  const types9  = ['','','','','','status','digit','digit','status'];
  const labels  = cfg.size === 6 ? labels6 : labels9;
  const types   = cfg.size === 6 ? types6  : types9;
  document.getElementById('frame-preview').innerHTML =
    frame.map((b,i) =>
      `<span class="byte-box ${types[i]}" title="${labels[i]}">${h(b)}</span>`
    ).join('');

  syncStatusBtns();
  syncDirBtns();
  syncAdvBits();
  scheduleAutoSend();
}

function buildStatusGrid() {
  const grid = document.getElementById('status-grid');
  grid.innerHTML = '';
  const currentDefs = FORMAT_DEFS[cfg.fmt].status;

  ALL_STATUS_ITEMS.forEach(item => {
    const def = currentDefs.find(d => d.key === item.key);
    const btn = document.createElement('button');
    btn.className   = 'status-btn';
    btn.innerHTML   = (STATUS_ICONS[item.key] || '') + `<span>${item.label}</span>`;
    btn.dataset.key = item.key;

    if (!def) {
      // Bu format bu durumu desteklemiyor: pasif göster, kaybetme.
      btn.classList.add('disabled');
      btn.disabled = true;
    } else {
      btn.onclick = () => {
        const isOn = def.s0bits.every(b => (s0 >> b) & 1) &&
                     def.s1bits.every(b => (s1 >> b) & 1);
        const val = isOn ? 0 : 1;
        def.s0bits.forEach(b => { if(val) s0 |= (1<<b); else s0 &= ~(1<<b); });
        def.s1bits.forEach(b => { if(val) s1 |= (1<<b); else s1 &= ~(1<<b); });
        update();
      };
    }
    grid.appendChild(btn);
  });
}

function syncStatusBtns() {
  const currentDefs = FORMAT_DEFS[cfg.fmt].status;
  ALL_STATUS_ITEMS.forEach(item => {
    const btn = document.querySelector(`.status-btn[data-key="${item.key}"]`);
    if (!btn) return;
    const def = currentDefs.find(d => d.key === item.key);
    if (!def) {
      btn.classList.remove('on');
      return;
    }
    const total = def.s0bits.length + def.s1bits.length;
    const isOn  = total > 0 &&
                  def.s0bits.every(b => (s0 >> b) & 1) &&
                  def.s1bits.every(b => (s1 >> b) & 1);
    btn.classList.toggle('on', isOn);
  });
}

function toggleDir(dir) {
  const def      = FORMAT_DEFS[cfg.fmt].dir;
  const bit      = def[dir].s1;
  const otherBit = def[dir === 'up' ? 'down' : 'up'].s1;
  const isOn     = (s1 >> bit) & 1;
  if (isOn) { s1 &= ~(1 << bit); }
  else       { s1 |= (1 << bit); s1 &= ~(1 << otherBit); }
  update();
}

function syncDirBtns() {
  const def = FORMAT_DEFS[cfg.fmt].dir;
  document.getElementById('btn-up').classList.toggle('on',   !!((s1 >> def.up.s1)   & 1));
  document.getElementById('btn-down').classList.toggle('on', !!((s1 >> def.down.s1) & 1));
}

function setOpt(key, val, btn) {
  cfg[key] = val;
  const grp = key === 'size' ? 'tg-size' : 'tg-fmt';
  document.querySelectorAll('#' + grp + ' button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (key === 'fmt') {
    s0 = FORMAT_DEFS[val].s0_const;
    s1 = 0;
    buildStatusGrid();
  }
  update();
}

function buildAdvBits() {
  ['s0', 's1'].forEach(which => {
    const el = document.getElementById('adv-' + which);
    el.innerHTML = '';
    for (let bit = 7; bit >= 0; bit--) {
      const btn = document.createElement('button');
      btn.className       = 'bit-btn';
      btn.dataset.which   = which;
      btn.dataset.bit     = bit;
      btn.innerHTML       = `<span class="bit-val">0</span><span class="bit-idx">${bit}</span>`;
      btn.onclick = () => {
        if (which === 's0') s0 ^= (1 << bit);
        else                s1 ^= (1 << bit);
        update();
      };
      el.appendChild(btn);
    }
  });
}

function syncAdvBits() {
  ['s0', 's1'].forEach(which => {
    const val = which === 's0' ? s0 : s1;
    for (let bit = 7; bit >= 0; bit--) {
      const btn = document.querySelector(`.bit-btn[data-which="${which}"][data-bit="${bit}"]`);
      if (!btn) continue;
      const v = (val >> bit) & 1;
      btn.classList.toggle('on', v === 1);
      btn.querySelector('.bit-val').textContent = v;
    }
  });
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.style.color = color; t.style.opacity = '1'; t.textContent = msg;
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

function setupDrum(idx) {
  const drum  = document.getElementById('drum' + idx);
  const inner = document.getElementById('inner' + idx);
  const n     = CHARS.length;
  const ITEM_H = 60;
  const OFFSET = 100;
  inner.innerHTML = CHARS.map((ch, i) =>
    `<div class="drum-item" data-i="${i}">${ch.c === ' ' ? '_' : ch.c}</div>`
  ).join('');

  function render(active) {
    digits[idx] = ((active % n) + n) % n;
    inner.style.transform = `translateY(${OFFSET - digits[idx] * ITEM_H}px)`;
    inner.querySelectorAll('.drum-item').forEach((el, i) => {
      el.classList.toggle('active', i === digits[idx]);
    });
    update();
  }

  let startY = 0, startIdx = 0, dragging = false, curIdx = 0;

  drum.addEventListener('mousedown', e => {
    dragging = true; startY = e.clientY; startIdx = digits[idx];
    inner.style.transition = 'none'; e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    curIdx = startIdx + Math.round((startY - e.clientY) / ITEM_H);
    render(curIdx);
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    render(curIdx);
  });
  drum.addEventListener('touchstart', e => {
    dragging = true; startY = e.touches[0].clientY; startIdx = digits[idx];
    inner.style.transition = 'none';
  }, { passive: true });
  drum.addEventListener('touchmove', e => {
    if (!dragging) return;
    curIdx = startIdx + Math.round((startY - e.touches[0].clientY) / ITEM_H);
    render(curIdx); e.preventDefault();
  }, { passive: false });
  drum.addEventListener('touchend', () => {
    dragging = false;
    inner.style.transition = 'transform .15s ease';
    render(curIdx);
  });
  drum.addEventListener('wheel', e => {
    e.preventDefault();
    curIdx = digits[idx] + (e.deltaY > 0 ? 1 : -1);
    inner.style.transition = 'transform .15s ease';
    render(curIdx);
  }, { passive: false });

  render(0);
}

// =====================================================================
// INIT
// =====================================================================
// =====================================================================
// CTRL BYTE — localStorage'a kaydetme/yükleme
// =====================================================================
const CTRL_BYTES_KEY = 'redlift_dspm_ctrl_bytes';

function loadCtrlBytes() {
  try {
    const saved = localStorage.getItem(CTRL_BYTES_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length === 3) {
        ctrlBytes = parsed;
      }
    }
  } catch (err) {
    console.error('CTRL byte yükleme hatası:', err);
  }
}

function saveCtrlBytes() {
  localStorage.setItem(CTRL_BYTES_KEY, JSON.stringify(ctrlBytes));
}

function setupCtrlByteInputs() {
  for (let i = 0; i < 3; i++) {
    const input = document.getElementById('ctrl-byte-' + i);
    input.value = ctrlBytes[i].toString(16).toUpperCase().padStart(2, '0');

    input.addEventListener('input', () => {
      // Sadece geçerli hex karakterlerine izin ver
      input.value = input.value.toUpperCase().replace(/[^0-9A-F]/g, '').slice(0, 2);
    });

    input.addEventListener('blur', () => {
      let val = parseInt(input.value, 16);
      if (isNaN(val)) val = 0;
      val = Math.max(0, Math.min(255, val));
      ctrlBytes[i] = val;
      input.value = val.toString(16).toUpperCase().padStart(2, '0');
      saveCtrlBytes();
      update();
    });
  }
}

loadCtrlBytes();
s0 = FORMAT_DEFS[cfg.fmt].s0_const;
buildStatusGrid();
buildAdvBits();
setupDrum(0);
setupDrum(1);
setupCtrlByteInputs();
update();
tryAutoReconnect();
</script>
