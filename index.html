<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>REDLIFT-MCI | Bağlantı</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a20;
    --border: #262b33;
    --text: #e6e8eb;
    --muted: #8a8f98;
    --accent: #3b82f6;
    --danger: #ef4444;
    --safe: #6b7280; /* bağlantı yokken nötr/güvenli renk */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .stage {
    height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .panel {
    width: min(100%, 960px);
    aspect-ratio: 16 / 9;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    overflow: auto;
  }
  .logo { font-size: 26px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.02em; }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .device-list {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
    margin-bottom: 32px;
  }
  .device-chip {
    font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 6px 14px;
  }
  .connect-btn {
    width: 100%; max-width: 320px;
    padding: 18px 24px; font-size: 16px; font-weight: 600;
    border: none; border-radius: 14px;
    background: var(--accent); color: white;
    cursor: pointer; transition: transform 0.1s ease;
  }
  .connect-btn:active { transform: scale(0.98); }
  .connect-btn:disabled { background: var(--safe); cursor: not-allowed; }
  .status { margin-top: 24px; font-size: 13px; color: var(--muted); min-height: 18px; }
  .status.error { color: var(--danger); }
  .status.ok { color: #22c55e; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="stage">
    <div class="panel">
      <div class="logo">REDLIFT<span>-MCI</span></div>
      <div class="subtitle">Kontrol panelini başlatmak için cihaza bağlanın</div>

      <div class="device-list" id="deviceList"></div>

      <button id="connectBtn" class="connect-btn">Cihaza Bağlan</button>

      <div id="status" class="status"></div>
    </div>
  </div>

<script>
  // Cihaz adı hangi ön ekle başlıyorsa o klasöre yönlendirilir.
  // Klasör yollarını kendi repo yapına göre güncelle.
  const BASE_URL = 'https://bilgehancirak.github.io/REDLIFT-MCI';
  const DEVICE_ROUTES = [
    { prefix: 'BILAB-DSPM',   path: BASE_URL + '/DSPM' },
    { prefix: 'REDLIFT-WELD', path: BASE_URL + '/weldmac' },
    { prefix: 'REDLIFT-ENC',  path: BASE_URL + '/enc' },
    { prefix: 'REDLIFT-ACU',  path: BASE_URL + '/acu' },
  ];

  const connectBtn = document.getElementById('connectBtn');
  const statusEl = document.getElementById('status');
  const deviceListEl = document.getElementById('deviceList');

  deviceListEl.innerHTML = DEVICE_ROUTES
    .map(r => '<span class="device-chip">' + r.prefix + '</span>')
    .join('');

  function setStatus(html, type) {
    statusEl.innerHTML = html;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  function resolveRoute(deviceName) {
    if (!deviceName) return null;
    return DEVICE_ROUTES.find(r => deviceName.startsWith(r.prefix)) || null;
  }

  async function connectToDevice() {
    if (!navigator.bluetooth) {
      setStatus('Bu tarayıcı Web Bluetooth desteklemiyor.', 'error');
      return;
    }

    connectBtn.disabled = true;
    setStatus('Cihaz seçimi bekleniyor...');

    try {
      const device = await navigator.bluetooth.requestDevice({
        filters: DEVICE_ROUTES.map(r => ({ namePrefix: r.prefix })),
        optionalServices: [
          // TODO: Gerçek Service UUID'lerini buraya ekle
          // 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx'
        ]
      });

      const route = resolveRoute(device.name);
      if (!route) {
        setStatus('Tanınmayan cihaz: ' + (device.name || 'isimsiz'), 'error');
        connectBtn.disabled = false;
        return;
      }

      setStatus('<span class="spinner"></span>Bağlanılıyor: ' + device.name);
      await device.gatt.connect();

      // Sonraki açılışlarda otomatik yeniden bağlanma için sakla
      localStorage.setItem('redlift_last_device_id', device.id);
      localStorage.setItem('redlift_last_device_name', device.name);

      setStatus('Bağlandı: ' + device.name, 'ok');
      window.location.href = route.path;

    } catch (err) {
      if (err.name === 'NotFoundError') {
        setStatus('Cihaz seçilmedi.', 'error');
      } else {
        setStatus('Bağlantı hatası: ' + err.message, 'error');
      }
      connectBtn.disabled = false;
    }
  }

  connectBtn.addEventListener('click', connectToDevice);

  // Daha önce eşleşmiş cihaz varsa sayfa açılışında otomatik bağlan
  window.addEventListener('load', async () => {
    if (!navigator.bluetooth || !navigator.bluetooth.getDevices) return;

    const lastId = localStorage.getItem('redlift_last_device_id');
    if (!lastId) return;

    try {
      const devices = await navigator.bluetooth.getDevices();
      const known = devices.find(d => d.id === lastId);
      if (!known) return;

      const route = resolveRoute(known.name);
      if (!route) return;

      setStatus('Önceki cihaza otomatik bağlanılıyor: ' + known.name);
      await known.gatt.connect();
      window.location.href = route.path;
    } catch (err) {
      console.warn('Oto-bağlantı başarısız:', err);
    }
  });
</script>
</body>
</html>
