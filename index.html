<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Redlift Cihaz Bağlantısı</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1e2227;
    --panel-border: #2c3138;
    --text: #e8e6e1;
    --text-dim: #8a8f98;
    --accent: #ff6a3d;
    --accent-dim: #ff6a3d33;
    --ok: #3ddc84;
    --danger: #ff4d4d;
    --font-display: 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    overflow: hidden; overscroll-behavior: none;
    background: var(--bg); color: var(--text); font-family: var(--font-display);
  }
  body { display: flex; align-items: center; justify-content: center; height: 100dvh; width: 100vw; padding: 20px; }
  .card { width: 100%; max-width: 400px; text-align: center; }
  .logo-mark {
    width: 64px; height: 64px; border-radius: 16px;
    background: var(--accent-dim); border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 21px; color: var(--accent);
    margin: 0 auto 20px; letter-spacing: 0.5px;
  }
  .eyebrow { font-size: 11px; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 18px; margin: 0 0 10px; line-height: 1.3; }
  p.desc { font-size: 13px; color: var(--text-dim); margin: 0 0 26px; line-height: 1.5; padding: 0 8px; }
  .connect-btn {
    width: 100%; background: var(--accent); color: #1a0900; border: none;
    padding: 16px 20px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .connect-btn:hover:not(:disabled) { filter: brightness(1.08); }
  .status { margin-top: 16px; font-size: 13px; color: var(--text-dim); min-height: 18px; }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--ok); }
  .spinner {
    width: 14px; height: 14px; border: 2px solid var(--panel-border); border-top-color: var(--accent);
    border-radius: 50%; display: inline-block; margin-right: 8px;
    animation: spin 0.7s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div class="card">
    <div class="logo-mark">RL</div>
    <div class="eyebrow">CONNECT A REDLIFT DEVICE</div>
    <h1>Bir Redlift cihazına bağlanın</h1>
    <p class="desc">!Devam etmek için yakındaki bir Redlift cihazını Bluetooth ile eşleştirin. Cihaz tipine göre ilgili kontrol paneli otomatik olarak açılacaktır.</p>
    <button class="connect-btn" id="connectBtn">Cihaza Bağlan</button>
    <div class="status" id="statusText"></div>
  </div>

<script>
// =========================================================
// CİHAZ -> KLASÖR YÖNLENDİRME TABLOSU
// Yeni cihaz tipi eklendikçe buraya satır eklenecek.
// =========================================================
const DEVICE_ROUTES = [
  { prefix: 'BILAB-DSPM',   label: 'KONE Panel Kontrolcü',      route: 'DSPM' },
  { prefix: 'REDLIFT-WELD', label: 'Kaynak Makinesi Kontrolcü', route: 'weldmac' },
];

function detectDeviceType(deviceName) {
  return DEVICE_ROUTES.find(r => deviceName && deviceName.startsWith(r.prefix)) || null;
}

const connectBtn = document.getElementById('connectBtn');
const statusText = document.getElementById('statusText');

connectBtn.addEventListener('click', async () => {
  connectBtn.disabled = true;
  statusText.className = 'status';
  statusText.innerHTML = '<span class="spinner"></span>Cihaz aranıyor...';

  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [
        { namePrefix: 'BILAB' },
        { namePrefix: 'REDLIFT' }
      ],
      optionalServices: [
        '0000ffe0-0000-1000-8000-00805f9b34fb', // genel/örnek UUID
        '12345678-1234-1234-1234-123456789abc'  // DSPM servis UUID
      ]
    });

    const info = detectDeviceType(device.name);

    if (!info) {
      statusText.textContent = 'Tanınmayan cihaz tipi: ' + (device.name || '—');
      statusText.className = 'status error';
      connectBtn.disabled = false;
      return;
    }

    // Bu cihazın id'sini ve rotasını kaydet — hedef sayfa bunu okuyup
    // otomatik (picker'sız) yeniden bağlanacak.
    localStorage.setItem('redlift_last_device_id', device.id);
    localStorage.setItem('redlift_last_device_name', device.name || '');
    localStorage.setItem('redlift_last_route', info.route);

    statusText.textContent = 'Bağlandı: ' + info.label + ', yönlendiriliyor...';
    statusText.className = 'status ok';

    setTimeout(() => {
      window.location.href = info.route + '/';
    }, 500);

  } catch (err) {
    console.error('BLE hatası:', err);
    statusText.textContent = 'Bağlantı başarısız: ' + err.message;
    statusText.className = 'status error';
    connectBtn.disabled = false;
  }
});
</script>

</body>
</html>
